name: Raco catalog simulation

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-cpu
            racket_arch: x64
          # Mirrors pkg-build.racket-lang.org's older libstdc++/glibc so we
          # catch symbol-version regressions before the catalog does.
          - os: ubuntu-22.04
            platform: linux-cpu
            racket_arch: x64
          - os: ubuntu-24.04-arm
            platform: linux-aarch64
            racket_arch: arm64
          - os: macos-latest
            platform: darwin
            racket_arch: arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # A platform's candidate is built on a host of that platform via
      # scripts/build-so.sh and committed under native-libs/candidates/.  Until
      # one is staged (e.g. the Linux candidates, which need a Linux host), skip
      # the job rather than fail so the rest of CI stays green.
      - name: Check candidate is staged
        id: candidate
        shell: bash
        run: |
          if ls "scs/native-libs/candidates/${{ matrix.platform }}"/libscsdir.* >/dev/null 2>&1; then
            echo "staged=true" >> "$GITHUB_OUTPUT"
          else
            echo "staged=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No candidate staged for ${{ matrix.platform }}; run scripts/build-so.sh on that platform and commit native-libs/candidates/${{ matrix.platform }}/. Skipping."
          fi

      - uses: Bogdanp/setup-racket@v1.15
        if: steps.candidate.outputs.staged == 'true'
        with:
          version: "stable"
          architecture: ${{ matrix.racket_arch }}

      - name: Portability check (Linux - ldd / readelf)
        if: runner.os == 'Linux' && steps.candidate.outputs.staged == 'true'
        shell: bash
        run: |
          set -euo pipefail
          CANDIDATE_DIR="scs/native-libs/candidates/${{ matrix.platform }}"
          for lib in "$CANDIDATE_DIR"/lib*.so*; do
            [ -f "$lib" ] || continue
            echo "=== $lib ===" && ldd "$lib" || true
            if ldd "$lib" 2>&1 | grep -q '/nix/store/'; then
              echo "ERROR: Nix store path in ldd output for $lib" >&2
              exit 1
            fi
          done
          # The SCS solvers must carry RUNPATH=$ORIGIN so the bundled
          # libopenblas / libgfortran / libgomp resolve from the same directory.
          for lib in "$CANDIDATE_DIR/libscsdir.so" "$CANDIDATE_DIR/libscsindir.so"; do
            [ -f "$lib" ] || continue
            if ! readelf -d "$lib" | grep -E 'R(UN)?PATH' | grep -q '\$ORIGIN'; then
              echo "ERROR: $lib missing RUNPATH=\$ORIGIN" >&2
              readelf -d "$lib" | grep -E 'R(UN)?PATH' || echo "  (no RPATH/RUNPATH entry)" >&2
              exit 1
            fi
          done
          # A bundled BLAS implementation must be present (LAPACK build).
          if ! ls "$CANDIDATE_DIR"/libopenblas*.so* >/dev/null 2>&1 \
             && ! ls "$CANDIDATE_DIR"/libblas*.so* >/dev/null 2>&1; then
            echo "ERROR: no bundled BLAS in $CANDIDATE_DIR" >&2
            exit 1
          fi
          # Every bundled lib must require no glibc symbol newer than 2.17 (the
          # CentOS 7 / manylinux2014 baseline pkg-build.racket-lang.org runs).
          # libgfortran's _Float128 math (@GLIBC_2.26) is redirected to the
          # bundled libscsshim.so by scripts/build-so.sh; see scripts/glibc-*.
          for lib in "$CANDIDATE_DIR"/lib*.so*; do
            [ -f "$lib" ] || continue
            maxv=$(readelf -V "$lib" 2>/dev/null | grep -oE 'GLIBC_[0-9]+\.[0-9]+' | sort -V | tail -1)
            [ -z "$maxv" ] && continue
            if [ "$(printf '%s\nGLIBC_2.17\n' "$maxv" | sort -V | tail -1)" != "GLIBC_2.17" ]; then
              echo "ERROR: $lib requires $maxv (> GLIBC_2.17)" >&2
              exit 1
            fi
          done
          # The glibc-compat shim must be staged: after the symbol rename the
          # SCS solvers' libgfortran resolves its f128 imports from it.
          if [ ! -f "$CANDIDATE_DIR/libscsshim.so" ]; then
            echo "ERROR: $CANDIDATE_DIR/libscsshim.so not staged" >&2
            exit 1
          fi
          echo "Portability check passed"

      - name: Portability check (macOS - otool)
        if: runner.os == 'macOS' && steps.candidate.outputs.staged == 'true'
        shell: bash
        run: |
          set -euo pipefail
          CANDIDATE_DIR="scs/native-libs/candidates/${{ matrix.platform }}"
          for lib in "$CANDIDATE_DIR"/lib*.dylib; do
            [ -f "$lib" ] || continue
            echo "=== $lib ===" && otool -L "$lib"
            BAD=$(otool -L "$lib" | tail -n +2 | awk '{print $1}' \
              | grep -v '^@loader_path/' \
              | grep -v '^@rpath/' \
              | grep -v '^/usr/lib/' \
              | grep -v '^/System/' \
              || true)
            if [ -n "$BAD" ]; then
              echo "ERROR: unexpected lib refs in $lib:" >&2
              echo "$BAD" >&2
              exit 1
            fi
          done
          echo "Portability check passed"

      - name: Install and test
        if: steps.candidate.outputs.staged == 'true'
        shell: bash
        run: bash scripts/test-local.sh
